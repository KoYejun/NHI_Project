name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create sample project
        run: |
          python scripts/create_sample_project.py

      - name: Run agent
        run: |
          python -m app.main --target-path data/sample_project

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Check formatting
        run: |
          python -m ruff format --check app tests scripts frontend

      - name: Run Ruff
        run: |
          python -m ruff check app tests scripts frontend

      - name: Run quality gate
        run: |
          python scripts/quality_gate.py